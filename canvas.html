                  ev.preventDefault();
                  openGenImageInNewWindow(rawOut);
                };
                img.title = '点击在新标签页打开原图（可右键另存为）';
                img.src = '';
                requestAnimationFrame(() => {
                  img.src = safe;
                  img.classList.remove('hidden');
                });
              } else if (!safe) {
                empty?.classList.remove('hidden');
                if (stEl) {
                  stEl.textContent =
                    '返回的图片地址格式异常，请使用下方「浏览器打开」重试。' +
                    (typeof j.data.balance === 'number' ? ' · 当前积分: ' + j.data.balance : '');
                }
              }
              if (safe) el.querySelector('.js-refine-actions')?.classList.remove('hidden');
              }
            } else {
              empty?.classList.remove('hidden');
              if (stEl) stEl.textContent = j.msg || '生成失败';
            }
          } catch (err) {
            empty?.classList.remove('hidden');
            if (stEl) stEl.textContent = err.message || String(err);
          } finally {
            loading?.classList.add('hidden');
            btn.disabled = false;
          }
        });
        el.querySelector('.js-refine-browser')?.addEventListener('click', () => {
          openGenImageInNewWindow(state.nodes[nodeId]?.lastRefineImageUrl);
        });
      }

              title="在新标签页打开原图，便于浏览与右键保存"
            >
              <i class="fa fa-external-link mr-1.5"></i>浏览器打开（浏览 / 右键另存为）
            </button>
          </div>
          <p class="js-refine-status text-[11px] text-gray-500 min-h-[1rem]"></p>
        </div>
        <div class="port port-in" data-port-type="in"></div>`;
      }
      return '';
    }

    function nodeWidth(type) {
      const w = { pano: '360px', scene: '300px', char: '300px', prop: '280px', grid: '460px', gen: '420px', refine: '380px' };
      return w[type] || '320px';
    }

    function spawnNode(type, x, y) {
      const nodeId = 'n' + ++state.nodeSeq + '_' + type;
      const el = document.createElement('div');
      el.className = 'studio-node';
      el.style.width = nodeWidth(type);
      if (type === 'pano') el.style.minHeight = '300px';
      if (type === 'grid') el.style.minHeight = '420px';
      if (type === 'gen') el.style.minHeight = '620px';
      if (type === 'refine') el.style.minHeight = '520px';
      if (type === 'prop') el.style.minHeight = '220px';
      if (type === 'scene') el.style.minHeight = '220px';
      el.innerHTML = nodeHtml(type);
      world.appendChild(el);
      registerNode(nodeId, el, x, y, type);
      if (type === 'pano') {
        const host = el.querySelector('.js-three-host');
        initThreeForNode(nodeId, host);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => resizePanoRendererToContainer(nodeId));
        });
      }
      if (type === 'grid') {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => resizeGridStageThree(nodeId));
        });
      }
      wireNode(el, nodeId, type);
      drawConnections();
      drawMinimap();
      return nodeId;
    }

    function spawnRefineLinkedToGen(genNodeId) {
      const gn = state.nodes[genNodeId];
      if (!gn || gn.type !== 'gen') return null;
      if (!gn.el.querySelector('.port-out')) return null;
      const x = gn.x + (gn.el.offsetWidth || 420) + 44;
      const y = gn.y;
      const rid = spawnNode('refine', x, y);
      if (rid) addLink(genNodeId, rid);
      return rid;
    }

    function removeNode(nodeId) {
      const n = state.nodes[nodeId];
      if (!n) return;
      disposeGridStageThree(nodeId);
      disposePanoThree(nodeId);
      state.links = state.links.filter((l) => l.from !== nodeId && l.to !== nodeId);
      n.el.remove();
      delete state.nodes[nodeId];
      drawConnections();
      drawMinimap();
      refreshAllGrids();
    }

    function initCanvas() {
      for (const id of Object.keys(state.nodes)) {
        disposeGridStageThree(id);
        disposePanoThree(id);
      }
      world.querySelectorAll('.studio-node').forEach((el) => el.remove());
      state.nodes = {};
      state.links = [];
      state.nodeSeq = 0;
      applyTransform();
    }

    /** 首次打开时的示例排布：全景仅直连资产生成；双角色进站位并直连资产生成；站位再连资产生成。 */
    function spawnDefaultCanvasLayout() {
      const panoId = spawnNode('pano', 40, 72);
      const char1Id = spawnNode('char', 40, 452);
      const char2Id = spawnNode('char', 48, 820);
      const gridId = spawnNode('grid', 528, 96);
      const genId = spawnNode('gen', 1060, 88);
      addLink(panoId, genId);
      addLink(char1Id, gridId);
      addLink(char1Id, genId);
      addLink(char2Id, gridId);
      addLink(char2Id, genId);
      addLink(gridId, genId);
    }

    function mountDirectorShotBridge() {
      if (document.getElementById('btn-director-push-image')) return;
      const p = getDirectorCanvasPayload();
      if (!p || !Number.isFinite(p.shotIdx)) return;
      let directorLastGenUrl = null;
      window.__canvasDirectorSetLastGen = (url) => {
        directorLastGenUrl = url ? String(url).trim() || null : null;
      };
      const bar = document.querySelector('.hint-bar');
      if (!bar) return;
      const wrap = document.createElement('span');
      wrap.className =
        'ml-2 flex flex-wrap items-center gap-2 border-l border-amber-500/25 pl-3 text-amber-100/95 text-[11px]';
      const embedHint = isDirectorEmbed()
        ? '<span class="w-full text-emerald-300/95 sm:w-auto">嵌入：<strong>资产生成 / 微调</strong>出图成功后将<strong>自动</strong>写回超级编导。</span>'
        : '';
      wrap.innerHTML =
        embedHint +
        '<span>超级编导 · 分镜 <strong class="text-amber-200">#' +
        (p.shotIdx + 1) +
        '</strong></span>' +
        '<button type="button" id="btn-director-push-image" class="rounded-md bg-emerald-700/50 border border-emerald-400/40 px-2 py-1 text-[11px] font-medium text-emerald-50 hover:bg-emerald-600/55">手动写回最近成图</button>' +
        '<button type="button" id="btn-director-clear-shot-ctx" class="text-[10px] text-gray-500 hover:text-gray-300 underline">结束联动</button>';
      bar.appendChild(wrap);
      document.getElementById('btn-director-push-image').addEventListener('click', () => {
        if (!directorLastGenUrl) {
          alert('请先在「资产生成」或「微调」节点成功出图，再点此按钮。');
          return;
        }
        const pNow = getDirectorCanvasPayload();
        const sid = pNow && Number.isFinite(pNow.shotIdx) ? pNow.shotIdx : p.shotIdx;
        if (isDirectorEmbed() && window.parent !== window) {
          try {
            window.parent.postMessage(
              { type: 'xunyu-director-shot-image', shotIdx: sid, imageUrl: directorLastGenUrl },
              window.location.origin
            );
          } catch (e) {
            alert(e.message || String(e));
            return;
          }
        } else {
          try {
            const ch = new BroadcastChannel('xunyu-director-canvas');
            ch.postMessage({ type: 'shot-image', shotIdx: sid, imageUrl: directorLastGenUrl });
            ch.close();
          } catch (e) {
            alert('发送失败：' + (e.message || String(e)));
            return;
          }
        }
        alert('已发送到超级编导。');
      });
      document.getElementById('btn-director-clear-shot-ctx').addEventListener('click', () => {
        try {
          sessionStorage.removeItem('director_canvas_shot');
        } catch (_) {}
        window.__directorCanvasInitPayload = null;
        window.__canvasDirectorSetLastGen = () => {};
        state.directorGridFallbackBgUrl = '';
        refreshAllGrids();
        wrap.remove();
      });
    }

    /** 预填场景描述、合成指令；主体参考：演员→角色三视图（优先），道具→道具参考，其余进合成指令 URL */
    function applyDirectorShotHydration() {
      const p = getDirectorCanvasPayload();
      if (!p) return;
      if (p.nonce && window.__directorHydratedNonce === p.nonce) {
        mountDirectorShotBridge();
        return;
      }
      if (p.nonce) window.__directorHydratedNonce = p.nonce;

      const desc = String(p.shotDescription || '').trim();
      const chars = String(p.shotCharacters || '').trim();
      const refUrls = Array.isArray(p.refUrls)
        ? p.refUrls.map((u) => String(u || '').trim()).filter(Boolean)
        : [];
      let refKinds = Array.isArray(p.refKinds)
        ? p.refKinds.map((k) => String(k || '').trim().toLowerCase())
        : [];
      if (refKinds.length !== refUrls.length) {
        refKinds = refUrls.map(() => 'other');
      }
      const snap = p.assetsSnapshot;
      if (snap && typeof snap === 'object') {
        refKinds = refUrls.map((u) => classifyRefUrlAgainstSnapshot(String(u || '').trim(), snap));
      }

      const charList = Object.values(state.nodes)
        .filter((n) => n && n.type === 'char')
        .sort((a, b) => (a.y || 0) - (b.y || 0));

      /** 演员库 → 角色三视图：先按分镜顺序收集演员参考，再补非场景/非道具的其它图，最多 2 张 */
      const actorUrlsOrdered = [];
      const otherCharUrlsOrdered = [];
      for (let i = 0; i < refUrls.length; i++) {
        const kind = refKinds[i] || 'other';
        if (kind === 'prop' || kind === 'scene') continue;
        if (kind === 'actor') actorUrlsOrdered.push(refUrls[i]);
        else otherCharUrlsOrdered.push(refUrls[i]);
      }
      const charFillUrls = actorUrlsOrdered.concat(otherCharUrlsOrdered).slice(0, 2);

      const propUrlList = [];
      for (let i = 0; i < refUrls.length; i++) {
        if (refKinds[i] === 'prop') propUrlList.push(refUrls[i]);
      }

      const charAssigned = new Set(charFillUrls);
      const propUrlSet = new Set(propUrlList);
      const extraRefUrls = [];
      for (let i = 0; i < refUrls.length; i++) {
        const u = refUrls[i];
        if (propUrlSet.has(u)) continue;
        if (charAssigned.has(u)) continue;
        if (refKinds[i] === 'scene') continue;
        extraRefUrls.push(u);
      }

      const sceneRefUrls = [];
      for (let i = 0; i < refUrls.length; i++) {
        if (refKinds[i] === 'scene') sceneRefUrls.push(refUrls[i]);
      }
      const pano360Src = String(p.pano360Url || '').trim();
      const shotImgSrc = String(p.shotImageUrl || '').trim();
      const firstSceneRefEarly = sceneRefUrls[0] ? String(sceneRefUrls[0]).trim() : '';
      state.directorGridFallbackBgUrl = (pano360Src || firstSceneRefEarly || shotImgSrc).trim();

      const genEntry = Object.values(state.nodes).find((n) => n && n.type === 'gen');
      if (genEntry && genEntry.el) {
        const sceneTa = genEntry.el.querySelector('.js-scene-desc');
        if (sceneTa) {
          const sceneParts = [];
          if (desc) sceneParts.push('【超级编导 · 分镜场景/画面描述】\n' + desc);
          if (chars) sceneParts.push('【出场人物】\n' + chars);
          const sceneBlock = sceneParts.join('\n\n');
          if (sceneBlock) {
            const curS = String(sceneTa.value || '').trim();
            sceneTa.value = curS ? sceneBlock + '\n\n---\n' + curS : sceneBlock;
          }
        }
        const genTa = genEntry.el.querySelector('.js-gen-prompt');
        if (genTa) {
          let genBlock =
            '【合成指令】按上方「场景补充描述」与连线中的角色/道具/全景或图片场景/站位参考生成与分镜一致的成片；可补充 @场景 @角色 等标签。\n';
          if (pano360Src) genBlock += '\n【全景环境参考】\n' + pano360Src;
          if (shotImgSrc && shotImgSrc !== pano360Src) {
            genBlock += '\n【分镜成图（编导本行）】\n' + shotImgSrc;
          }
          if (extraRefUrls.length) {
            genBlock +=
              '\n【更多主体参考（URL）】\n' +
              extraRefUrls.map((u, j) => String(j + 1) + '. ' + u).join('\n');
          }
          const curG = String(genTa.value || '').trim();
          genTa.value = curG ? genBlock + '\n---\n' + curG : genBlock;
        }
      }

      if (charFillUrls[0] && charList[0]) setCharNodeRemoteUrl(charList[0].id, charFillUrls[0]);
      if (charFillUrls[1] && charList[1]) setCharNodeRemoteUrl(charList[1].id, charFillUrls[1]);

      if (propUrlList.length && genEntry && genEntry.id) {
        const gx = genEntry.x || 0;
        const gy = genEntry.y || 0;
        const baseX = Math.max(36, gx - 420);
        let py = Math.max(980, gy + 420);
        for (let pi = 0; pi < propUrlList.length; pi++) {
          const pid = spawnNode('prop', baseX + (pi % 2) * 288, py + Math.floor(pi / 2) * 220);
          setPropNodeRemoteUrl(pid, propUrlList[pi]);
          addLink(pid, genEntry.id);
        }
        drawConnections();
        drawMinimap();
      }

      if (sceneRefUrls.length && genEntry && genEntry.id) {
        const gx = genEntry.x || 0;
        const gy = genEntry.y || 0;
        const baseX = Math.max(36, gx - 420);
        const scY = Math.max(620, gy + 200);
        for (let si = 0; si < sceneRefUrls.length; si++) {
          const sid = spawnNode('scene', baseX + (si % 2) * 288, scY + Math.floor(si / 2) * 220);
          setSceneNodeRemoteUrl(sid, sceneRefUrls[si]);
          addLink(sid, genEntry.id);
        }
        drawConnections();
        drawMinimap();
      }

      const firstSceneRef = sceneRefUrls[0] ? String(sceneRefUrls[0]).trim() : '';
      const flatForSceneModule = pano360Src ? '' : (firstSceneRef || (shotImgSrc ? String(shotImgSrc).trim() : ''));

      if (pano360Src) {
        const panoEntry = Object.values(state.nodes).find((n) => n && n.type === 'pano');
        if (panoEntry && panoEntry.id) {
          const nid = panoEntry.id;
          let tries = 0;
          const tryPanoTex = () => {
            if (state.nodes[nid]?.panothree) {
              loadPanoTextureForNode(nid, pano360Src);
              return;
            }
            tries++;
            if (tries < 12) setTimeout(tryPanoTex, tries < 4 ? 50 : 120);
          };
          requestAnimationFrame(() => {
            requestAnimationFrame(tryPanoTex);
          });
        }
      } else if (flatForSceneModule) {
        const panoEntry = Object.values(state.nodes).find((n) => n && n.type === 'pano');
        if (panoEntry && panoEntry.id) {
          const cap = firstSceneRef
            ? '编导带入：本行「主体参考」中的场景图（无 360° 全景）。已显示在下方「场景图」区域，并参与站位底图与资产生成参考。'
            : '编导带入：本分镜成图（无全景与单独场景参考时）。已显示在下方「场景图」区域，并参与站位底图与资产生成参考。';
          requestAnimationFrame(() => {
            showPanoDirectorFlatScene(panoEntry.id, flatForSceneModule, cap);
          });
        }
      } else {
        const panoEntry = Object.values(state.nodes).find((n) => n && n.type === 'pano');
        if (panoEntry?.id) {
          const pn = state.nodes[panoEntry.id];
          if (pn) delete pn.directorSceneFlatUrl;
          if (!pn?.lastCaptureDataUrl) syncPanoSceneWrapVisibility(panoEntry.id);
        }
      }

      refreshAllGrids();
      mountDirectorShotBridge();
    }

    window.addEventListener('message', (ev) => {
      if (ev.origin !== window.location.origin) return;
      if (ev.data && ev.data.type === 'xunyu-director-canvas-init') {
        window.__directorCanvasInitPayload = ev.data.payload || null;
        applyDirectorShotHydration();
      }
    });

    wireGlobalFileInputs();
    initCanvas();
    spawnDefaultCanvasLayout();
    applyDirectorShotHydration();
  </script>
</body>
</html>
