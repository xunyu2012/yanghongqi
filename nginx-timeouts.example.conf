# =============================================================================
# 讯语：避免反代在「长耗时请求」上返回 HTTP 502/504
# =============================================================================
# Nginx 默认 proxy_read_timeout 常为 60s。成图、生视频、大模型长输出等若超过该值，
# 反代会先断开并返回 504，而 Node 可能仍在执行——浏览器会提示「网关超时」。
#
# 本项目已将「编导八工种研讨」改为：POST 立即返回 job_id + 轮询状态，一般不再触发
# 该接口的 504；其它长 POST（若仍有）仍依赖下方反代超时与 Node 超时对齐。
#
# 用法：把下面 **location 花括号内** 的 proxy_* 四行合并进你已有的、含 proxy_pass 的
# location（勿重复 proxy_pass）。超时建议 ≥300s，极长成图/视频可 600s。
# 须与 .env.example 中 HTTP_SERVER_REQUEST_TIMEOUT_MS 同量级或更大。
# 修改后：nginx -t && systemctl reload nginx
# =============================================================================

# 将下列内容并入已有 location / { ... } 或 location /api/ { ... } 内（示例）：

#   proxy_connect_timeout 60s;
#   proxy_send_timeout 300s;
#   proxy_read_timeout 300s;
#   send_timeout 300s;
#   client_max_body_size 80m;
#   client_body_timeout 120s;

# --- 独立参考：整站反代到 Node（勿直接 include 本文件；请复制进站点配置）---

# server {
#   listen 443 ssl;
#   server_name your.domain;
#   location / {
#     proxy_pass http://127.0.0.1:3000;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_connect_timeout 60s;
#     proxy_send_timeout 300s;
#     proxy_read_timeout 300s;
#     send_timeout 300s;
#     client_max_body_size 80m;
#     client_body_timeout 120s;
#   }
# }

# --- 可选：仅放宽 /api/（避免整站 location / 不便改太大时，长耗时接口仍 504）---
# 须放在「更泛的 location /」之前（前缀 location 优先匹配）。按需改 300s/600s。
#
# location ^~ /api/ {
#   proxy_pass http://127.0.0.1:3000;
#   proxy_http_version 1.1;
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_connect_timeout 60s;
#   proxy_send_timeout 600s;
#   proxy_read_timeout 600s;
#   send_timeout 600s;
#   client_max_body_size 80m;
#   client_body_timeout 120s;
# }

# uwsgi_pass / fastcgi_pass 时改用 uwsgi_read_timeout / fastcgi_read_timeout 等。
